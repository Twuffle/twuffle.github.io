<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wenching Hour - Dialogue Editor</title>
<link rel="stylesheet" href="editor.css">
</head>
<body>

<div id="app">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <span class="toolbar-title">🧙 Dialogue Editor</span>
    <div class="toolbar-actions">
      <button id="btn-load-server" title="Load dialogue.json from the server">📥 Load from Server</button>
      <label class="btn" title="Load a local dialogue.json file">
        📂 Load File
        <input type="file" id="file-input" accept=".json" style="display:none;">
      </label>
      <button id="btn-save" title="Download dialogue.json">💾 Save JSON</button>
      <button id="btn-validate" title="Run validation checks">✅ Validate</button>
      <button id="btn-preview-toggle" title="Toggle JSON preview">👁 JSON Preview</button>
    </div>
  </div>

  <!-- DRAFT RESTORE BANNER -->
  <div id="draft-banner" style="display:none;">
    <span>📝 A saved draft was found in your browser.</span>
    <button id="btn-restore-draft">Restore Draft</button>
    <button id="btn-discard-draft">Discard</button>
  </div>

  <!-- MAIN LAYOUT -->
  <div id="main-layout">

    <!-- LEFT: NPC LIST -->
    <div id="npc-list-panel">
      <div class="panel-header">
        <span>NPCs</span>
        <button id="btn-add-npc" title="Add a new NPC">+ Add NPC</button>
      </div>
      <div id="npc-list"></div>
      <hr>
      <div class="panel-header">
        <span>Views</span>
      </div>
      <button class="nav-btn" id="btn-nav-schedule">📅 Schedule</button>
      <button class="nav-btn" id="btn-nav-config">⚙️ Config</button>
    </div>

    <!-- CENTRE: EDITOR PANE -->
    <div id="editor-pane">
      <div id="editor-content">
        <div class="placeholder">Select an NPC, or open Schedule / Config.</div>
      </div>
    </div>

    <!-- RIGHT: JSON PREVIEW -->
    <div id="json-preview-panel" class="hidden">
      <div class="panel-header"><span>JSON Preview</span></div>
      <pre id="json-preview"></pre>
    </div>

  </div>

  <!-- BOTTOM: WARNINGS -->
  <div id="warnings-panel">
    <div class="panel-header" id="warnings-header" style="cursor:pointer;">
      <span>⚠️ Warnings / Validation <span id="warning-count-badge"></span></span>
      <span id="warnings-toggle-icon">▲</span>
    </div>
    <div id="warnings-body"></div>
  </div>

</div>

<script src="editor.js"></script>
</body>
</html>
