<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dialogue Editor — The Wenching Hour</title>
<link rel="stylesheet" href="editor.css">
</head>
<body>

<header class="app-header">
  <h1>🍺 Dialogue Editor</h1>
  <div class="header-actions">
    <button class="btn" id="btnImport">📂 Import JSON</button>
    <button class="btn" id="btnLoadDefault">📄 Load dialogue.json</button>
    <button class="btn btn-primary" id="btnExport">💾 Export JSON</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>
</header>

<div class="app-body">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <h3>General</h3>
      <div class="sidebar-item" data-panel="config"><span class="icon">⚙️</span> Config</div>
      <div class="sidebar-item" data-panel="schedule"><span class="icon">📅</span> Schedule</div>
    </div>
    <div class="sidebar-section" id="npcSidebarSection">
      <h3>NPCs</h3>
      <div id="npcSidebarList"></div>
      <div class="sidebar-add" id="addNpcBtn">+ Add NPC</div>
    </div>
  </nav>

  <main class="main-panel" id="mainPanel">
    <div class="empty-state" id="welcomePanel">
      <p>Load a dialogue.json file or start building from scratch.</p>
      <p style="margin-top:12px; font-size:0.85rem; color:#666;">Use the sidebar to navigate between Config, Schedule, and NPCs.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="editor.js"></script>
</body>
</html>
