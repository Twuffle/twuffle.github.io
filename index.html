<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Wenching Hour - Economy Prototype</title>
<style>
  body { font-family: Arial; background:#1e1e1e; color:#eee; padding:20px; }
  h1 { margin-bottom:5px; }
  .stats, .npc, .end { margin-top:20px; padding:15px; background:#2a2a2a; border-radius:8px; opacity:0; transition: opacity 0.3s ease; }
  button { margin:5px; padding:10px; cursor:pointer; }
  .good { color:#4caf50; }
  .bad { color:#f44336; }

.fade-out {
  opacity: 0;
  transition: opacity 0.3s ease;
}

.fade-in {
  opacity: 1;
  transition: opacity 0.3s ease;
}

</style>
</head>
<body>

<h1>The Wenching Hour</h1>
<p>Day <span id="day">1</span> / <span id="maxDays"></span></p>

<div class="stats">
  <h3>Stats</h3>
	Royalty: <span id="royalty"></span>
	Populace: <span id="populace"></span>
	Kingdom: <span id="kingdom"></span>
	Power: <span id="power"></span>
	Suspicion: <span id="suspicion"></span>
</div>

<div class="npc" id="npcContainer">
  <div style="display:flex; gap:15px; align-items:center;">
    <img id="npcPortrait" src="" style="width:100px; height:100px; object-fit:cover; border-radius:8px;">
    
    <div>
      <h3 id="npcName">NPC</h3>
      <p id="npcDesc">Description</p>
    </div>
  </div>

  <div id="choices"></div>
</div>

<div class="end" id="endScreen" style="display:none;">
  <h2>Trial Results</h2>
  <p id="finalStats"></p>
</div>

<div id="warnings" style="
  margin-top:20px;
  background:#3a2a00;
  padding:10px;
  border-radius:6px;
  color:#ffcc00;
"></div>

<script>
//Load the dialogue json and related variables into the html
let GAME_DATA = null;
let NPCS = {};
let SCHEDULE = [];

// CONFIG
const CONFIG = {
  START: 50,
  MIN: 0,
  MAX: 100,
  DAYS: 3,
  NPCS_PER_DAY: 5
};

// STATE
let stats = {
  royalty: CONFIG.START,
  populace: CONFIG.START,
  kingdom: CONFIG.START,
  power: 0,
  suspicion: CONFIG.START
};

let currentStep = 0;
let totalSteps = CONFIG.DAYS * CONFIG.NPCS_PER_DAY;

let isTransitioning = false;

let choiceHistory = {};
let currentNpcName = null;

// Load the game data
async function loadGameData() {
  const response = await fetch("dialogue.json");
  GAME_DATA = await response.json();

  NPCS = GAME_DATA.npcs;
  SCHEDULE = GAME_DATA.schedule;

  validateConfig();
  
  startGame();
}

//Start the game
function startGame() {
  document.getElementById("maxDays").innerText = CONFIG.DAYS;

  // Setup portrait fallback ONCE
  const portrait = document.getElementById("npcPortrait");
  portrait.onerror = () => {
    portrait.src = "images/default.png"; //The default image to put there if image missing
    showWarning(
      `NPC Image is not loading! Automatically reset it to default`
    );
  };

  // Fade in the stats container once at the start
  document.querySelector(".stats").classList.add("fade-in");

  updateStats();
  nextStep();
}

//Helper to build the choice buttons
function updateChoices(choices, visual, recordChoice) {
  let choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  for (let key in choices) {
    let c = choices[key];
    let displayText = resolveVariantText(c.text);
    let displayEffects = resolveVariantEffects(c.effects || {});

    if (c.if && !evaluateCondition(c.if)) {
      if (c.showLocked) {
        let locked = document.createElement("button");
        locked.disabled = true;
        locked.style.opacity = "0.5";
        locked.innerHTML = `<b>${key}</b> - ${displayText} \u{1F512}<br><small>${formatChoice(displayEffects)}</small><br><small>Requires: ${describeCondition(c.if)}</small>`;
        choicesDiv.appendChild(locked);
      }
      continue;
    }

    let btn = document.createElement("button");

    btn.innerHTML = `<b>${key}</b> - ${displayText}<br>${formatChoice(displayEffects)}`;

    btn.onclick = () => {
      if (isTransitioning) return;

      if (recordChoice && currentNpcName) {
        if (!choiceHistory[currentNpcName]) choiceHistory[currentNpcName] = [];
        choiceHistory[currentNpcName].push(key);
      }

      let effects = c.effects ? resolveVariantEffects(c.effects) : null;
      if (effects) applyChoice(effects);
      updateStats();

      if (c.next) {
        advanceToBranchNode(c.next, visual);
      } else {
        currentStep++;
        let dayNumber = Math.min(CONFIG.DAYS, Math.floor(currentStep / CONFIG.NPCS_PER_DAY) + 1);
        document.getElementById("day").innerText = dayNumber;
        nextStep();
      }
    };
    choicesDiv.appendChild(btn);
  }
}

function advanceToBranchNode(node, visual) {
  isTransitioning = true;
  const container = document.getElementById("npcContainer");

  container.classList.remove("fade-in");
  container.classList.add("fade-out");

  setTimeout(() => {
    document.getElementById("npcDesc").innerText = resolveVariantText(node.desc);
    updateChoices(node.choices, visual, false);

    void container.offsetWidth;
    container.classList.remove("fade-out");
    container.classList.add("fade-in");

    setTimeout(() => { isTransitioning = false; }, 300);
  }, 300);
}

//Warning system
const warningsDiv = document.getElementById("warnings");
let warningCount = 0;

// Call this once at start
function initWarnings() {
  warningsDiv.innerHTML = "No Warnings";
}

// Call this whenever a warning occurs
function showWarning(message) {
  console.warn(message);

  // Remove "No Warnings" text if it's the first warning
  if (warningCount === 0) {
    warningsDiv.innerHTML = "";
  }

  warningsDiv.innerHTML += `<div>⚠️ ${message}</div>`;
  warningCount++;
}

// Helper to find NPC by name


//Resets warnings upon launch and checks for config errors
function validateConfig() {
  // Reset warnings first
  warningCount = 0;
  initWarnings();

  // Check total days
  if (SCHEDULE.length !== CONFIG.DAYS) {
    showWarning(
      `SCHEDULE has ${SCHEDULE.length} days, but CONFIG.DAYS is ${CONFIG.DAYS}`
    );
  }

  // Check NPC count per day + NPC existence
  SCHEDULE.forEach((day, index) => {
    if (day.length !== CONFIG.NPCS_PER_DAY) {
      showWarning(
        `Day ${index + 1} has ${day.length} NPCs, expected ${CONFIG.NPCS_PER_DAY}`
      );
    }
	
	//Check for invalid NPC names
	day.forEach((npcName) => {
	if (!NPCS[npcName]) {
	showWarning(`Unknown NPC "${npcName}" in Day ${index + 1}`);
	}
	});
  });
}

// clamp function
function clamp(value) {
  return Math.max(CONFIG.MIN, Math.min(CONFIG.MAX, value));
}

// apply choice
function applyChoice(effects) {
  for (let key in stats) {
    stats[key] = clamp(stats[key] + (effects[key] || 0));
  }
}


// update UI
function updateStats() {
  for (let key in stats) {
    document.getElementById(key).innerText = stats[key];
  }
}

//Formatting helpers
function formatStat(label, value) {
  let className = value > 0 ? "good" : "bad";
  return `<span class="${className}">${label}:${value}</span>`;
}

function formatChoice(effects) {
  let parts = [];
  if (effects.royalty) parts.push(formatStat("R", effects.royalty));
  if (effects.populace) parts.push(formatStat("P", effects.populace));
  if (effects.kingdom) parts.push(formatStat("K", effects.kingdom));
  if (effects.power) parts.push(formatStat("Pow", effects.power));
  if (effects.suspicion) parts.push(formatStat("S", effects.suspicion));
  return parts.join(" ");
}

// --- Condition system helpers ---

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function computeVisitCount(npcName) {
  let dayIndex = Math.floor(currentStep / CONFIG.NPCS_PER_DAY);
  let npcIndex = currentStep % CONFIG.NPCS_PER_DAY;
  let count = 0;
  for (let d = 0; d <= dayIndex; d++) {
    let day = SCHEDULE[d];
    let end = d === dayIndex ? npcIndex : day.length;
    for (let i = 0; i < end; i++) {
      if (day[i] === npcName) count++;
    }
  }
  return count;
}

function resolveNpcVariant(npc) {
  if (!npc.variants) return npc;
  for (let variant of npc.variants) {
    if (!variant.if || evaluateCondition(variant.if)) {
      return Object.assign({}, npc, variant);
    }
  }
  return npc;
}

function evaluateCondition(cond) {
  if (!cond) return true;

  if (cond.and) return cond.and.every(evaluateCondition);
  if (cond.or) return cond.or.some(evaluateCondition);
  if (cond.not) return !evaluateCondition(cond.not);

  if (cond.stat !== undefined) {
    let current = stats[cond.stat];
    let op = cond.op || "==";
    switch (op) {
      case ">": return current > cond.value;
      case "<": return current < cond.value;
      case ">=": return current >= cond.value;
      case "<=": return current <= cond.value;
      case "==": return current === cond.value;
      case "!=": return current !== cond.value;
    }
  }

  if (cond.chose) {
    let { npc, choice, last } = cond.chose;
    let history = choiceHistory[npc];
    if (!history || !history.length) return false;
    if (last) return history[history.length - 1] === choice;
    return history.includes(choice);
  }

  if (cond.visits !== undefined) {
    let count = computeVisitCount(currentNpcName);
    if (typeof cond.visits === "object") {
      let { op, value } = cond.visits;
      switch (op) {
        case ">": return count > value;
        case "<": return count < value;
        case ">=": return count >= value;
        case "<=": return count <= value;
        case "==": return count === value;
        case "!=": return count !== value;
      }
    }
    return count === cond.visits;
  }

  if (cond.day !== undefined) {
    let currentDay = Math.floor(currentStep / CONFIG.NPCS_PER_DAY) + 1;
    if (typeof cond.day === "object") {
      let { op, value } = cond.day;
      switch (op) {
        case ">": return currentDay > value;
        case "<": return currentDay < value;
        case ">=": return currentDay >= value;
        case "<=": return currentDay <= value;
        case "==": return currentDay === value;
        case "!=": return currentDay !== value;
      }
    }
    return currentDay === cond.day;
  }

  return false;
}

function resolveVariantText(variants) {
  if (typeof variants === "string") return variants;
  if (!Array.isArray(variants)) return variants;
  for (let entry of variants) {
    if (!entry.if || evaluateCondition(entry.if)) {
      return entry.text;
    }
  }
  return "";
}

function resolveVariantEffects(variants) {
  if (!Array.isArray(variants)) return variants || {};
  for (let entry of variants) {
    if (!entry.if || evaluateCondition(entry.if)) {
      return entry;
    }
  }
  return {};
}

function describeCondition(cond) {
  if (!cond) return "";

  if (cond.and) return "(" + cond.and.map(describeCondition).join(" and ") + ")";
  if (cond.or) return "(" + cond.or.map(describeCondition).join(" or ") + ")";
  if (cond.not) return "Not (" + describeCondition(cond.not) + ")";

  if (cond.stat !== undefined) {
    let opLabels = { ">": "&gt;", "<": "&lt;", ">=": "≥", "<=": "≤", "==": "=", "!=": "≠" };
    return capitalize(cond.stat) + " " + (opLabels[cond.op] || cond.op) + " " + cond.value;
  }

  if (cond.chose) {
    let { npc, choice, last } = cond.chose;
    return last ? "Last chose " + choice + " for " + npc : "Chose " + choice + " for " + npc;
  }

  if (cond.visits !== undefined) {
    if (typeof cond.visits === "object") {
      let opLabels = { ">": "&gt;", "<": "&lt;", ">=": "≥", "<=": "≤", "==": "=", "!=": "≠" };
      return "Visit count " + (opLabels[cond.visits.op] || cond.visits.op) + " " + cond.visits.value;
    }
    return "Visit " + (cond.visits + 1);
  }

  if (cond.day !== undefined) {
    if (typeof cond.day === "object") {
      let opLabels = { ">": "&gt;", "<": "&lt;", ">=": "≥", "<=": "≤", "==": "=", "!=": "≠" };
      return "Day " + (opLabels[cond.day.op] || cond.day.op) + " " + cond.day.value;
    }
    return "Day " + cond.day;
  }

  return "";
}

// load next NPC
function nextStep() {
  isTransitioning = true;
  if (currentStep >= totalSteps) {
    endGame();
    return;
  }

  let dayIndex = Math.floor(currentStep / CONFIG.NPCS_PER_DAY);
  let npcIndex = currentStep % CONFIG.NPCS_PER_DAY;
  let npcName = SCHEDULE[dayIndex][npcIndex];
  let npc = NPCS[npcName];

  currentNpcName = npcName;

  if (!npc) {
    console.error("NPC not found:", npcName);
    return;
  }

  let resolved = resolveNpcVariant(npc);
  let visual = resolved.visual || {};

  const container = document.getElementById("npcContainer");
  const portrait = document.getElementById("npcPortrait");

  const updateContent = () => {
    portrait.src = visual.portrait || "images/default.png";
    document.getElementById("npcName").innerText = npcName;
    document.getElementById("npcDesc").innerText = resolveVariantText(resolved.desc);
    container.style.border = `2px solid ${visual.color || "#888"}`;
    container.style.background = visual.color ? visual.color + "22" : "#2a2a2a";

    updateChoices(resolved.choices, visual, true);
  };

  if (currentStep === 0) {
    updateContent();
    void container.offsetWidth; 
    container.classList.add("fade-in");
    isTransitioning = false;
  } else {
    container.classList.remove("fade-in");
    container.classList.add("fade-out");

    setTimeout(() => {
      updateContent();
      void container.offsetWidth;
      container.classList.remove("fade-out");
      container.classList.add("fade-in");

      setTimeout(() => { isTransitioning = false; }, 300);
    }, 300);
  }

}

// end game
function endGame() {
  const endScreen = document.getElementById("endScreen");
  const npcContainer = document.getElementById("npcContainer");

  // 1. Hide the NPC and stats containers
  npcContainer.style.display = "none";
  document.querySelector(".stats").style.display = "none";

  // 2. Make the end screen exist in the layout
  endScreen.style.display = "block";

  // 3. Force a reflow and then fade it in
  void endScreen.offsetWidth; 
  endScreen.classList.add("fade-in");

  // 4. Fill in the results
  document.getElementById("finalStats").innerHTML = `
    Royalty: ${stats.royalty}<br>
    Populace: ${stats.populace}<br>
    Kingdom: ${stats.kingdom}<br>
    Power: ${stats.power}<br>
    Suspicion: ${stats.suspicion}
  `;
}

// Set max days display from config
document.getElementById("maxDays").innerText = CONFIG.DAYS;

loadGameData();

</script>

</body>
</html>
